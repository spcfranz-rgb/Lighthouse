services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: cctv-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data/mosquitto-data:/mosquitto/data
      - ./data/mosquitto-log:/mosquitto/log

  cctv-dashboard:
    build: https://github.com/spcfranz-rgb/CCTVMonitor-NOC.git#test
    container_name: cctv-dashboard
    restart: unless-stopped
    
    # 1. Force the container to run as standard user UID 1000 (instead of root 0)
    user: "1000:1000"
    
    # 2. Grant the specific kernel capability required for Ping/Traceroute
    cap_add:
      - NET_RAW
      
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - COMPANY_LOGO_URL=${COMPANY_LOGO_URL}
      - CUSTOMER_LOGO_URL=${CUSTOMER_LOGO_URL}
      - DEFAULT_MQTT_BROKER=mqtt-broker
      - DEFAULT_MQTT_PORT=1883
      - AUTHENTIK_URL=${AUTHENTIK_URL}
      - AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}
      - AUTHENTIK_CLIENT_SECRET=${AUTHENTIK_CLIENT_SECRET}
    volumes:
      - ./data:/app/data
    tmpfs:
      - /app/data_ram
    depends_on:
      - mqtt-broker
