services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: cctv-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data/mosquitto-data:/mosquitto/data
      - ./data/mosquitto-log:/mosquitto/log
    # Log Rotation: Caps at 50MB total (10MB x 5 files) and compresses old logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"

  cctv-dashboard:
    build: .
    container_name: cctv-dashboard
    restart: unless-stopped
    
    # Break out of the Docker bridge to read physical Layer 2 MAC addresses
    network_mode: "host" 
    
    # REQUIRED: Elevate privileges so ping, traceroute, and ARP scans have raw socket access
    user: root
    
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - COMPANY_LOGO_URL=${COMPANY_LOGO_URL}
      - CUSTOMER_LOGO_URL=${CUSTOMER_LOGO_URL}
      
      # Update broker to localhost since Docker DNS is bypassed in host mode
      - DEFAULT_MQTT_BROKER=127.0.0.1 
      - DEFAULT_MQTT_PORT=1883
      
      - AUTHENTIK_URL=${AUTHENTIK_URL}
      - AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}
      - AUTHENTIK_CLIENT_SECRET=${AUTHENTIK_CLIENT_SECRET}
      
    volumes:
      - ./data:/app/data
    tmpfs:
      - /app/data_ram
    depends_on:
      - mqtt-broker
      
    # Log Rotation: Caps at 50MB total (10MB x 5 files) and compresses old logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
