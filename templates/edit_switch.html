<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Switch - CCTV Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="container py-5" style="max-width: 600px;">
    
    <div class="card border-warning shadow">
        <div class="card-header bg-dark border-warning d-flex justify-content-between align-items-center">
            <h4 class="mb-0 text-warning">Edit Switch</h4>
            <span class="badge bg-secondary">ID: {{ switch.id }}</span>
        </div>
        <div class="card-body bg-body-tertiary">
            <form action="/edit_switch/{{ switch.id }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                
                <div class="mb-3">
                    <label for="name" class="form-label text-muted small fw-bold">Switch Name (Must be unique)</label>
                    <input type="text" class="form-control border-secondary" id="name" name="name" value="{{ switch.name }}" required>
                </div>
                
                <div class="mb-4">
                    <label for="ip" class="form-label text-muted small fw-bold">IP Address or Hostname</label>
                    <input type="text" class="form-control border-secondary" id="ip" name="ip" value="{{ switch.ip }}" required>
                </div>
                
                <div class="d-flex justify-content-between pt-3 border-top border-secondary">
                    <a href="/" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-warning px-4 fw-bold">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = 'Saving...';
        });
    </script>
</body>
</html>
