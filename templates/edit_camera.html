<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Camera - CCTV Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="container py-5" style="max-width: 800px;">
    
    <div class="card border-info shadow">
        <div class="card-header bg-dark border-info d-flex justify-content-between align-items-center">
            <h4 class="mb-0 text-info">Edit Camera</h4>
            <span class="badge bg-secondary">ID: {{ camera.id }}</span>
        </div>
        <div class="card-body bg-body-tertiary">
            <form action="/edit_camera/{{ camera.id }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label text-muted small fw-bold">Camera Name (Must be unique)</label>
                        <input type="text" class="form-control border-secondary" id="name" name="name" value="{{ camera.name }}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="switch_id" class="form-label text-muted small fw-bold">Parent Switch (Dependency)</label>
                        <select class="form-select border-secondary" id="switch_id" name="switch_id">
                            <option value="">None (Standalone)</option>
                            {% for s in switches %}
                                <option value="{{ s.id }}" {% if camera.switch_id == s.id %}selected{% endif %}>{{ s.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="ip" class="form-label text-muted small fw-bold">IP Address</label>
                        <input type="text" class="form-control border-secondary" id="ip" name="ip" value="{{ camera.ip }}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="manufacturer" class="form-label text-muted small fw-bold">Hardware Manufacturer</label>
                        <select class="form-select border-secondary" id="manufacturer" name="manufacturer" required>
                            <option value="Other" {% if camera.manufacturer == 'Other' %}selected{% endif %}>Other (FFmpeg RTSP)</option>
                            <option value="Hanwha" {% if camera.manufacturer == 'Hanwha' %}selected{% endif %}>Hanwha / Wisenet</option>
                            <option value="Hikvision" {% if camera.manufacturer == 'Hikvision' %}selected{% endif %}>Hikvision</option>
                            <option value="Dahua" {% if camera.manufacturer == 'Dahua' %}selected{% endif %}>Dahua</option>
                            <option value="Amcrest" {% if camera.manufacturer == 'Amcrest' %}selected{% endif %}>Amcrest</option>
                            <option value="Axis" {% if camera.manufacturer == 'Axis' %}selected{% endif %}>Axis</option>
                            <option value="Foscam" {% if camera.manufacturer == 'Foscam' %}selected{% endif %}>Foscam</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="stream_url" class="form-label text-muted small fw-bold">RTSP Stream URL</label>
                    <input type="text" class="form-control border-secondary" id="stream_url" name="stream_url" value="{{ camera.stream_url }}" required>
                    <div class="form-text small">Used for FFMPEG liveness checks and snapshot fallback mechanism.</div>
                </div>

                <div class="row mb-4 bg-dark p-3 rounded border border-secondary mx-0">
                    <div class="col-12 mb-2"><h6 class="mb-0 text-muted">Authentication <span class="small fw-normal">(For HTTP API Snapshots)</span></h6></div>
                    <div class="col-md-6">
                        <label for="username" class="form-label text-muted small">Camera Username</label>
                        <input type="text" class="form-control form-control-sm border-secondary" id="username" name="username" value="{{ camera.username }}">
                    </div>
                    <div class="col-md-6">
                        <label for="password" class="form-label text-muted small">Camera Password</label>
                        <input type="password" class="form-control form-control-sm border-secondary" id="password" name="password" value="{{ camera.password }}">
                    </div>
                </div>

                <div class="d-flex justify-content-between pt-3 border-top border-secondary">
                    <a href="/" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-info px-4 fw-bold">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = 'Saving...';
        });
    </script>
</body>
</html>
