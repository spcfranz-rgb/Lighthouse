# Restrict API and Signaling to localhost (Flask will proxy this securely)
api: yes
apiAddress: 127.0.0.1:9997

webrtc: yes
webrtcAddress: :8189
webrtcLocalUDPAddress: :8189
# Leave STUN/TURN empty for now; Tailscale usually handles direct peer routing gracefully.

paths:
  # Paths will be dynamically generated by Flask via the REST API
  all_others:
    source: publisher
