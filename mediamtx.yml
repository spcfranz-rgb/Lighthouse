# ==========================================
# DISABLE UNUSED PROTOCOLS
# ==========================================
# Prevents port collisions on the host network (like :8888 for HLS)
# and hardens the container by reducing the attack surface.
rtsp: no
rtmp: no
hls: no
srt: no

# ==========================================
# SECURE API & SIGNALING
# ==========================================
# Restrict API to localhost (Flask proxies this securely)
api: yes
apiAddress: 127.0.0.1:9997

# ==========================================
# WEBRTC CONFIGURATION
# ==========================================
webrtc: yes
webrtcAddress: :8189
webrtcLocalUDPAddress: :8189

# Inform MediaMTX of our local Coturn relay (if deployed)
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
  # - url: turn:127.0.0.1:3478
  #   username: lighthouse_relay
  #   password: ${TURN_SECRET_KEY}
  #   protocols: [udp, tcp]

# ==========================================
# DYNAMIC PATHS
# ==========================================
paths:
  # Paths will be dynamically generated by Flask via the REST API
  all_others:
    source: publisher
